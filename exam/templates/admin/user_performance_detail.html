<!DOCTYPE html>
<html>
<head>
    <title>User Performance Detail</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f0f0f0;
        }
        .correct {
            color: green;
            font-weight: bold;
        }
        .wrong {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Performance Details: {{ result.user.username }} - {{ result.quiz.title }}</h1>
    
    <p><strong>Score:</strong> {{ result.score }}</p>
    <p><strong>Submitted on:</strong> {{ result.submission_time }}</p>

    <table>
        <thead>
            <tr>
                <th>Question</th>
                <th>Correct Answer</th>
            </tr>
        </thead>
        <tbody>
            {% for question in result.quiz.questions.all %}
                <tr>
                    <td>{{ question.text|safe }}</td>
                    <td>{{ question.correct_option_text }}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
