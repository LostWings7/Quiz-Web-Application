<!DOCTYPE html>
<html>
<head>
    <title>User Performance - {{ quiz.title }}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #f0f0f0;
        }
        .view-button {
            padding: 6px 12px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        .view-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>User Performance for Quiz: {{ quiz.title }}</h1>
    
    {% if results %}
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Score</th>
                    <th>Time Submitted</th>
                    <th>View Details</th>
                </tr>
            </thead>
            <tbody>
                {% for result in results %}
                    <tr>
                        <td>{{ result.user.username }}</td>
                        <td>{{ result.score }}</td>
                        <td>{{ result.submission_time }}</td>
                        <td>
                            <a href="{% url 'user_performance_detail' result.id %}" class="view-button">View</a>
                        </td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>No performance data available for this quiz.</p>
    {% endif %}
</div>

</body>
</html>
